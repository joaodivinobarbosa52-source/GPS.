<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AgroSystem Pro - Satélite</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0 }
  
  html, body { 
    height: 100%; 
    width: 100%;
    overflow: hidden; 
    font-family:'Segoe UI', sans-serif; 
    background:#0d1117; 
    color:#e0e0e0; 
  }

  /* Organização em flex para o painel não fugir da tela */
  body { 
    display: flex; 
    flex-direction: column; 
  }

  /* HEADER */
  #header {
    background:linear-gradient(135deg,#1b4332,#2d6a4f);
    padding:10px 16px; display:flex; align-items:center;
    gap:10px; box-shadow:0 2px 8px rgba(0,0,0,.5);
    flex-shrink: 0;
  }
  #header h1 { font-size:15px; font-weight:700; color:#fff }
  #header small { font-size:10px; color:#b7e4c7; display:block }
  #source-badge {
    margin-left:auto; background:#0d3b26; border:1px solid #2d6a4f;
    border-radius:8px; padding:4px 10px; font-size:10px; color:#74c69d
  }

  /* MAPA */
  #map { flex: 1; width: 100%; z-index: 1; }

  /* PAINEL - Ajustado para não ser esmagado */
  .panel {
    background:#161b22; 
    padding:12px;
    display:flex; 
    flex-direction:column; 
    gap:8px;
    border-top: 1px solid #30363d;
    flex-shrink: 0;
    padding-bottom: env(safe-area-inset-bottom, 12px);
  }

  .row { 
    display:flex; 
    gap:8px; 
    align-items:center; 
    width: 100%;
  }

  /* Seletores e Inputs */
  select, input[type=date] {
    flex: 1;
    min-width: 0;
    padding: 9px 12px; 
    border-radius:10px;
    border:1px solid #30363d; 
    background:#0d1117;
    color:#e0e0e0; 
    font-size:13px; 
    outline:none;
    height: 42px;
  }
  select:focus, input:focus { border-color:#2d6a4f }

  /* BOTÕES - Todos restaurados e com tamanho corrigido */
  button {
    flex: 1;
    height: 42px;
    border:none;
    border-radius:10px; 
    color:#fff; 
    font-weight:700;
    font-size:13px; 
    cursor:pointer; 
    transition:.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
  }

  button:active { transform:scale(.97); filter: brightness(1.2); }
  button:disabled { opacity:.45; cursor:wait }

  .btn-today  { background:#4a148c; flex: 0 0 auto; padding: 0 15px; font-size: 11px; }
  .btn-gps    { background:#1565c0; }
  .btn-update { background:#1b5e20; }

  /* LEGENDA */
  #legend {
    position:absolute; bottom:135px; right:10px;
    background:#161b22ee; border:1px solid #30363d;
    border-radius:12px; padding:10px 13px;
    font-size:11px; z-index:1000; min-width:145px;
    pointer-events: none;
  }
  #legend h4 { color:#95d5b2; margin-bottom:7px; font-size:12px }
  .li { display:flex; align-items:center; gap:7px; margin:3px 0 }
  .lc { width:20px; height:11px; border-radius:3px; flex-shrink:0 }

  /* TOAST */
  #toast {
    position:fixed; top:58px; left:50%;
    transform:translateX(-50%);
    background:#0d1117ee; color:#95d5b2;
    padding:6px 18px; border-radius:20px;
    font-size:12px; z-index:2000;
    border:1px solid #2d6a4f;
    opacity:0; transition:opacity .3s;
    pointer-events:none; white-space:nowrap
  }

  /* GPS PULSANTE */
  .pulse-ring {
    border:3px solid #1976d2;
    border-radius:50%; height:30px; width:30px;
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    animation:pulse 1.5s ease-out infinite
  }
  @keyframes pulse {
    0%   { transform:translate(-50%,-50%) scale(.5); opacity:1 }
    100% { transform:translate(-50%,-50%) scale(2.2); opacity:0 }
  }
  .pulse-dot {
    background:#1976d2; border:3px solid #fff;
    border-radius:50%; height:14px; width:14px;
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 8px rgba(25,118,210,.8)
  }

  /* RESOLUÇÃO BADGE */
  #res-info {
    position:absolute; top:58px; left:10px;
    background:#0d1117cc; border:1px solid #30363d;
    border-radius:8px; padding:4px 10px;
    font-size:10px; color:#74c69d; z-index:1000
  }
</style>
</head>
<body>

<div id="header">
  <span style="font-size:24px">🌿</span>
  <div>
    <h1>AgroSystem Pro</h1>
    <small>Monitoramento por Satélite</small>
  </div>
  <div id="source-badge">🛰️ NASA GIBS · EOSDIS</div>
</div>

<div id="map"></div>
<div id="legend"></div>
<div id="res-info" style="display:none"></div>
<div id="toast"></div>

<div class="panel">
  <div class="row">
    <select id="layer" onchange="onLayerChange()">
      <option value="NDVI">🌱 NDVI — Saúde da Vegetação</option>
      <option value="TRUE-COLOR">🖼️ RGB — Cor Real (VIIRS)</option>
      <option value="FALSE-COLOR">🔴 Falsa Cor — Infravermelho</option>
      <option value="LAND-TEMP">🌡️ Temperatura Superficial</option>
    </select>
    <button class="btn-today" onclick="setToday()">📅 Hoje</button>
  </div>
  <div class="row">
    <input type="date" id="date">
    <button class="btn-gps" onclick="goToMyLocation()">📍 Ir para minha localização</button>
    <button class="btn-update" id="btnUpdate" onclick="updateLayer()">🛰️ Carregar Imagem</button>
  </div>
</div>

<script>
// CONFIGURAÇÃO NASA GIBS
const GIBS = {
  'NDVI': {
    tpl: d => `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_NDVI_8Day/default/${d}/GoogleMapsCompatible/{z}/{y}/{x}.png`,
    maxZ: 7, res: 'MODIS · 250 m · composição 8 dias',
    legend: {
      title: 'NDVI – Vegetação',
      items: [
        {c:'#005a00', l:'Floresta densa (>0.8)'},
        {c:'#1a9641', l:'Vegetação saudável'},
        {c:'#a6d96a', l:'Vegetação moderada'},
        {c:'#ffffbf', l:'Vegetação escassa'},
        {c:'#d7191c', l:'Solo / sem vegetação'},
      ]
    }
  },
  'TRUE-COLOR': {
    tpl: d => `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_SNPP_CorrectedReflectance_TrueColor/default/${d}/GoogleMapsCompatible/{z}/{y}/{x}.jpg`,
    maxZ: 8, res: 'VIIRS SNPP · 375 m · cor real diária',
    legend: {
      title: 'RGB – Cor Real',
      items: [
        {c:'#226622', l:'Vegetação'},
        {c:'#c8b400', l:'Área agrícola'},
        {c:'#d2b48c', l:'Solo exposto'},
        {c:'#4169e1', l:'Água'},
        {c:'#ffffff', l:'Nuvens'},
      ]
    }
  },
  'FALSE-COLOR': {
    tpl: d => `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_CorrectedReflectance_Bands721/default/${d}/GoogleMapsCompatible/{z}/{y}/{x}.jpg`,
    maxZ: 8, res: 'MODIS Terra · 500 m · NIR Bandas 7-2-1',
    legend: {
      title: 'Falsa Cor NIR',
      items: [
        {c:'#cc0000', l:'Vegetação ativa'},
        {c:'#ff9999', l:'Vegetação jovem'},
        {c:'#ffa500', l:'Área queimada'},
        {c:'#555555', l:'Solo / Urbano'},
        {c:'#003399', l:'Água'},
      ]
    }
  },
  'LAND-TEMP': {
    tpl: d => `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_Land_Surface_Temp_Day/default/${d}/GoogleMapsCompatible/{z}/{y}/{x}.png`,
    maxZ: 7, res: 'MODIS Terra · 1 km · temp. superficial diurna',
    legend: {
      title: 'Temperatura (°C)',
      items: [
        {c:'#67001f', l:'> 45°C (muito quente)'},
        {c:'#d6604d', l:'35 – 45°C'},
        {c:'#fddbc7', l:'25 – 35°C'},
        {c:'#4393c3', l:'15 – 25°C'},
        {c:'#053061', l:'< 15°C (frio)'},
      ]
    }
  }
};

const map = L.map('map', { zoomControl: true }).setView([-15.8, -47.9], 5);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution:'© Esri · NASA', maxZoom:19
}).addTo(map);

let currentLayer = null;
let isLoading = false;
let locationMarker = null;
let locationCircle = null;

function toast(msg, dur = 3000) {
  const el = document.getElementById('toast');
  el.innerText = msg; el.style.opacity = 1;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.opacity = 0, dur);
}

function setLoading(v) {
  isLoading = v;
  const b = document.getElementById('btnUpdate');
  b.disabled = v;
  b.textContent = v ? '⏳ Carregando...' : '🛰️ Carregar Imagem';
}

function setToday() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  document.getElementById('date').value = d.toISOString().split('T')[0];
  toast('📅 Data definida para ontem');
}

function snapToModis8Day(dateStr) {
  const epoch = new Date('2000-01-01');
  const target = new Date(dateStr);
  const diff = Math.floor((target - epoch) / 86400000);
  const snapped = new Date(epoch);
  snapped.setDate(snapped.getDate() + Math.floor(diff / 8) * 8);
  return snapped.toISOString().split('T')[0];
}

function updateLegend(type) {
  const leg = GIBS[type]?.legend;
  const el = document.getElementById('legend');
  el.innerHTML = `<h4>${leg.title}</h4>` +
    leg.items.map(i => `<div class="li"><div class="lc" style="background:${i.c}"></div><span>${i.l}</span></div>`).join('');
}

function onLayerChange() {
  const type = document.getElementById('layer').value;
  updateLegend(type);
  document.getElementById('res-info').style.display = 'block';
  document.getElementById('res-info').textContent = '📡 ' + GIBS[type].res;
}

function updateLayer() {
  if (isLoading) return;
  const type = document.getElementById('layer').value;
  let dateVal = document.getElementById('date').value;
  if (!dateVal) { toast('⚠️ Escolha uma data'); return; }
  let usedDate = (type === 'NDVI') ? snapToModis8Day(dateVal) : dateVal;
  const url = GIBS[type].tpl(usedDate);
  if (currentLayer) map.removeLayer(currentLayer);
  setLoading(true);
  currentLayer = L.tileLayer(url, { maxZoom: GIBS[type].maxZ, opacity: 0.88 }).addTo(map);
  currentLayer.on('tileload', () => { setLoading(false); toast(`✅ ${type} carregado!`); });
  setTimeout(() => { if (isLoading) { setLoading(false); toast('⚠️ Sem dados.'); } }, 15000);
}

function goToMyLocation() {
  if (!navigator.geolocation) return toast('❌ GPS não suportado');
  toast('📡 Obtendo localização...');
  navigator.geolocation.getCurrentPosition((pos) => {
    const lat = pos.coords.latitude, lng = pos.coords.longitude, acc = Math.round(pos.coords.accuracy);
    if (locationMarker) map.removeLayer(locationMarker);
    if (locationCircle) map.removeLayer(locationCircle);
    locationCircle = L.circle([lat, lng], { radius: acc, color: '#1976d2', fillOpacity: 0.1 }).addTo(map);
    const pulseIcon = L.divIcon({
      className: '', iconSize: [30, 30], iconAnchor: [15, 15],
      html: `<div style="position:relative;width:30px;height:30px"><div class="pulse-ring"></div><div class="pulse-dot"></div></div>`
    });
    locationMarker = L.marker([lat, lng], { icon: pulseIcon }).addTo(map).bindPopup("📍 Você está aqui").openPopup();
    map.flyTo([lat, lng], 13);
    toast('✅ Localizado');
  }, (err) => toast('❌ Erro GPS'), { enableHighAccuracy: true });
}

(function init() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  const iso = d.toISOString().split('T')[0];
  document.getElementById('date').value = iso;
  onLayerChange();
})();
</script>
</body>
</html>
